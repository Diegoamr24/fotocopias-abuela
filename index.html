<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedido de fotocopias</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 20px; }
    .card { background: white; border-radius: 12px; padding: 24px; max-width: 500px; margin: 0 auto; }
    h1 { font-size: 22px; margin-bottom: 6px; }
    p.sub { color: #666; font-size: 14px; margin-bottom: 24px; }
    label { font-size: 14px; color: #444; display: block; margin-bottom: 5px; margin-top: 14px; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
    textarea { height: 80px; resize: none; }
    .btn { width: 100%; margin-top: 20px; padding: 14px; background: #13678A; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .btn:hover { opacity: 0.9; }
    .mensaje { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; text-align: center; display: none; }
    .ok { background: #EAF3DE; color: #3B6D11; }
    .error { background: #FCEBEB; color: #A32D2D; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Pedido de fotocopias</h1>
    <p class="sub">Completa el formulario y tu pedido llega directo a la tienda.</p>

    <label>Tu nombre *</label>
    <input type="text" id="nombre" placeholder="Ej: Martina González">

    <label>Teléfono (opcional)</label>
    <input type="tel" id="telefono" placeholder="Ej: +58 414 123 4567">

    <label>Tipo de trabajo *</label>
    <select id="tipo">
      <option value="">Selecciona...</option>
      <option>Fotocopias</option>
      <option>Impresión B/N</option>
      <option>Impresión color</option>
      <option>Anillado</option>
      <option>Transcripción</option>
    </select>

    <label>Cantidad de copias *</label>
    <input type="number" id="copias" min="1" value="1">

    <label>Instrucciones (doble cara, tamaño, etc.)</label>
    <textarea id="instrucciones" placeholder="Ej: doble cara, tamaño oficio, grapado..."></textarea>

    <label>Archivo a imprimir *</label>
    <div id="zona-archivos" style="border:1px solid #ddd;border-radius:8px;padding:12px;">
    <div id="lista-archivos" style="margin-bottom:8px;display:none;"></div>
    <button type="button" onclick="seleccionarArchivo()" style="padding:8px 14px;border:1px dashed #aaa;border-radius:8px;background:transparent;font-size:14px;color:#555;cursor:pointer;width:100%;">+ Agregar archivo</button>
    <input type="file" id="input-archivo-oculto" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" style="display:none;" onchange="archivoSeleccionado(this)">
    </div>
    <p style="font-size:13px;color:#999;margin-top:6px;">PDF, Word, JPG o PNG.</p>

    <button class="btn" onclick="enviarPedido()">Enviar pedido</button>
    <div class="mensaje" id="mensaje"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://nxftuzqhptqpfwpcydag.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54ZnR1enFocHRxcGZ3cGN5ZGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NjkxMDIsImV4cCI6MjA4OTQ0NTEwMn0.FsufrLL0EormHjiyEixi4Xh0CfkXc-aXOtnC64l-4GQ'
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    let archivosSeleccionados = []

    function seleccionarArchivo() {
    document.getElementById('input-archivo-oculto').click()
    }

    function archivoSeleccionado(input) {
    const archivo = input.files[0]
    if (!archivo) return
    archivosSeleccionados.push(archivo)
    input.value = ''
    renderizarArchivos()
    }

    function eliminarArchivo(index) {
    archivosSeleccionados.splice(index, 1)
    renderizarArchivos()
    }

    function renderizarArchivos() {
    const lista = document.getElementById('lista-archivos')
    if (archivosSeleccionados.length === 0) {
        lista.style.display = 'none'
        lista.innerHTML = ''
        return
    }
    lista.style.display = 'block'
    lista.innerHTML = archivosSeleccionados.map((a, i) => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:#f5f5f5;border-radius:6px;margin-bottom:6px;font-size:14px;">
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80%;">${a.name}</span>
        <button type="button" onclick="eliminarArchivo(${i})" style="border:none;background:none;color:#A32D2D;cursor:pointer;font-size:16px;padding:0 4px;">×</button>
        </div>
    `).join('')
    }

    async function enviarPedido() {
      const nombre = document.getElementById('nombre').value.trim()
      const telefono = document.getElementById('telefono').value.trim()
      const tipo = document.getElementById('tipo').value
      const copias = document.getElementById('copias').value
      const instrucciones = document.getElementById('instrucciones').value.trim()
      const archivos = archivosSeleccionados

        if (!nombre || !tipo || archivos.length === 0) {
        mostrarMensaje('Por favor completa los campos obligatorios (*) y sube al menos un archivo.', 'error')
        return
        }

      const btn = document.querySelector('.btn')
      btn.textContent = 'Enviando...'
      btn.disabled = true

      try {
        const urlsArchivos = []
        const nombresArchivos = []

        for (const archivo of archivos) {
        const ext = archivo.name.split('.').pop()
        const nombreArchivo = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`
        const { error: errorArchivo } = await sb.storage
            .from('archivos-pedidos')
            .upload(nombreArchivo, archivo)
        if (errorArchivo) throw errorArchivo
        const { data: urlData } = sb.storage
            .from('archivos-pedidos')
            .getPublicUrl(nombreArchivo)
        urlsArchivos.push(urlData.publicUrl)
        nombresArchivos.push(archivo.name)
        }

        const { error: errorPedido } = await sb
        .from('pedidos')
        .insert({
            nombre,
            telefono,
            tipo,
            copias: parseInt(copias),
            instrucciones,
            archivo_url: urlsArchivos.join('||'),
            archivo_nombre: nombresArchivos.join('||')
        })

        if (errorPedido) throw errorPedido

        mostrarMensaje('¡Pedido enviado! Te avisamos cuando esté listo.', 'ok')
        document.querySelectorAll('input, select, textarea').forEach(el => el.value = '')
        archivosSeleccionados = []
        renderizarArchivos()

      } catch (err) {
        mostrarMensaje('Hubo un error al enviar el pedido. Intenta de nuevo.', 'error')
        console.error(err)
      }

      btn.textContent = 'Enviar pedido'
      btn.disabled = false
    }

    function mostrarMensaje(texto, tipo) {
      const el = document.getElementById('mensaje')
      el.textContent = texto
      el.className = 'mensaje ' + tipo
      el.style.display = 'block'
    }
  </script>
</body>
</html>
