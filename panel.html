<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel - Fotocopias</title>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 20px; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .sub { color: #666; font-size: 14px; margin-bottom: 24px; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
    .stat { background: white; border-radius: 10px; padding: 14px; text-align: center; }
    .stat-num { font-size: 28px; font-weight: 500; }
    .stat-label { font-size: 12px; color: #666; margin-top: 2px; }
    .filtros { display: flex; gap: 8px; margin-bottom: 16px; }
    .filtro { padding: 6px 14px; border-radius: 8px; border: 1px solid #ddd; background: white; font-size: 14px; cursor: pointer; }
    .filtro.active { background: #13678A; color: white; border-color: #13678A; }
    .pedido { background: white; border-radius: 10px; padding: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .pedido.listo { opacity: 0.5; }
    .pedido-info { flex: 1; }
    .pedido-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
    .nombre { font-size: 16px; font-weight: 500; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; }
    .badge-pendiente { background: #FAEEDA; color: #854F0B; }
    .badge-listo { background: #EAF3DE; color: #3B6D11; }
    .detalle { font-size: 14px; color: #555; margin-bottom: 3px; }
    .hora { font-size: 12px; color: #999; }
    .acciones { display: flex; flex-direction: column; gap: 6px; width: 240px; }
    .btn-listo { padding: 7px 14px; font-size: 13px; cursor: pointer; border-radius: 8px; background: #EAF3DE; color: #3B6D11; border: 1px solid #C0DD97; white-space: nowrap; }
    .btn-listo:hover { background: #C0DD97; }
    .btn-archivo { padding: 7px 14px; font-size: 13px; cursor: pointer; border-radius: 8px; background: #E6F1FB; color: #185FA5; border: 1px solid #B5D4F4; text-decoration: none; display: block; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .vacio { text-align: center; padding: 40px; color: #999; font-size: 15px; }
    .nuevo-badge { animation: pulso 1s ease-out; }
    @keyframes pulso { 0% { transform: scale(1.04); } 100% { transform: scale(1); } }
  </style>
</head>
<body>

    <div id="login" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f5;">
  <div style="background:white;padding:32px;border-radius:12px;width:100%;max-width:320px;">
    <h2 style="font-size:20px;margin-bottom:6px;">Panel de pedidos</h2>
    <p style="font-size:14px;color:#666;margin-bottom:20px;">Ingresa la contraseña para continuar.</p>
    <input type="password" id="clave-input" placeholder="Contraseña" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:15px;margin-bottom:10px;">
    <button onclick="verificarClave()" style="width:100%;padding:12px;background:#13678A;color:white;border:none;border-radius:8px;font-size:15px;cursor:pointer;">Entrar</button>
    <p id="error-clave" style="color:#A32D2D;font-size:13px;margin-top:8px;display:none;">Contraseña incorrecta.</p>
  </div>
</div>

<div id="contenido" style="display:none;">
  <h1>Panel de pedidos</h1>
  <p class="sub">Los pedidos aparecen aquí automáticamente.</p>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="cnt-pendiente">0</div><div class="stat-label">Pendientes</div></div>
    <div class="stat"><div class="stat-num" id="cnt-listo">0</div><div class="stat-label">Listos</div></div>
    <div class="stat"><div class="stat-num" id="cnt-total">0</div><div class="stat-label">Total hoy</div></div>
  </div>

  <div class="filtros">
    <button class="filtro active" onclick="setFiltro('todos', this)">Todos</button>
    <button class="filtro" onclick="setFiltro('pendiente', this)">Pendientes</button>
    <button class="filtro" onclick="setFiltro('listo', this)">Listos</button>
  </div>

  <div id="lista"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = CONFIG.supabaseUrl
    const SUPABASE_KEY = CONFIG.supabaseKey
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    let pedidos = []
    let filtro = 'todos'

    async function cargarPedidos() {
      const hoy = new Date()
      hoy.setHours(0, 0, 0, 0)
      const { data, error } = await sb
        .from('pedidos')
        .select('*')
        .gte('creado_en', hoy.toISOString())
        .order('creado_en', { ascending: false })
      if (!error) {
        pedidos = data
        renderizar()
      }
    }

    async function marcarListo(id, estadoActual) {
      const nuevoEstado = estadoActual === 'listo' ? 'pendiente' : 'listo'
      await sb.from('pedidos').update({ estado: nuevoEstado }).eq('id', id)
      const p = pedidos.find(x => x.id === id)
      if (p) p.estado = nuevoEstado
      renderizar()
    }

    function setFiltro(f, btn) {
      filtro = f
      document.querySelectorAll('.filtro').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      renderizar()
    }

    function formatHora(iso) {
      return new Date(iso).toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' })
    }

    function renderizar() {
      const pend = pedidos.filter(p => p.estado === 'pendiente').length
      const list = pedidos.filter(p => p.estado === 'listo').length
      document.getElementById('cnt-pendiente').textContent = pend
      document.getElementById('cnt-listo').textContent = list
      document.getElementById('cnt-total').textContent = pedidos.length

      const filtrados = filtro === 'todos' ? pedidos : pedidos.filter(p => p.estado === filtro)
      const el = document.getElementById('lista')

      if (filtrados.length === 0) {
        el.innerHTML = '<div class="vacio">No hay pedidos aquí todavía</div>'
        return
      }

      el.innerHTML = filtrados.map(p => `
        <div class="pedido ${p.estado === 'listo' ? 'listo' : ''}" id="p-${p.id}">
          <div class="pedido-info">
            <div class="pedido-header">
              <span class="nombre">${esc(p.nombre)}</span>
              <span class="badge badge-${p.estado}">${p.estado === 'listo' ? 'Listo' : 'Pendiente'}</span>
            </div>
            <div class="detalle">${esc(p.tipo)} · ${p.copias} copia${p.copias > 1 ? 's' : ''}</div>
            ${p.instrucciones ? `<div class="detalle">${esc(p.instrucciones)}</div>` : ''}
            ${p.telefono ? `<div class="detalle">Tel: ${esc(p.telefono)}</div>` : ''}
            <div class="hora">Recibido: ${formatHora(p.creado_en)}</div>
          </div>
          <div class="acciones">
            <button class="btn-listo" onclick="marcarListo('${p.id}', '${p.estado}')">
              ${p.estado === 'listo' ? 'Reabrir' : 'Marcar listo'}
            </button>
            ${p.archivo_url ? p.archivo_url.split('||').map((url, i) => {
                const nombre = p.archivo_nombre ? p.archivo_nombre.split('||')[i] : `Archivo ${i+1}`
                return `<a class="btn-archivo" href="${url}" download="${nombre}" title="${nombre}">⬇ ${nombre}</a>`
            }).join('') : ''}
          </div>
        </div>
      `).join('')
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    }

    // Tiempo real
    sb.channel('pedidos-channel')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'pedidos' }, payload => {
        pedidos.unshift(payload.new)
        renderizar()
        const el = document.getElementById('p-' + payload.new.id)
        if (el) el.classList.add('nuevo-badge')
      })
      .subscribe()

    // cargarPedidos() — se llama después del login

        const CLAVE = CONFIG.panelPassword

    function verificarClave() {
        const input = document.getElementById('clave-input').value
        if (input === CLAVE) {
            localStorage.setItem('panel-auth', 'true')
            mostrarPanel()
        } else {
            document.getElementById('error-clave').style.display = 'block'
        }
        }

        function mostrarPanel() {
        document.getElementById('login').style.display = 'none'
        document.getElementById('contenido').style.display = 'block'
        cargarPedidos()
        }

        if (localStorage.getItem('panel-auth') === 'true') {
        mostrarPanel()
        }
    document.getElementById('clave-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') verificarClave()
    })
  </script>
</body>
</html>
